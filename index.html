<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMS Pro Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}
body{
  display:flex;
  background:#f4f6f9;
}
.sidebar{
  width:250px;
  height:100vh;
  background:#111827;
  color:#fff;
  padding:20px;
}
.sidebar h2{
  margin-bottom:30px;
}
.sidebar a{
  display:block;
  color:#9ca3af;
  padding:10px;
  margin:10px 0;
  text-decoration:none;
  border-radius:8px;
  transition:0.3s;
}
.sidebar a:hover{
  background:#1f2937;
  color:#fff;
}
.main{
  flex:1;
  padding:20px;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.search{
  padding:10px;
  width:250px;
  border-radius:10px;
  border:1px solid #ccc;
}
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}
.card{
  background:#fff;
  padding:20px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.card h3{
  margin-bottom:10px;
}
.profile{
  background:#fff;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}
.btn{
  padding:10px 15px;
  background:#2563eb;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="sidebar">
<h2>LMS</h2>
<a href="#">Dashboard</a>
<a href="#">Courses</a>
<a href="#">Materials</a>
<a href="#">Profile</a>
<a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">
<div class="header">
<h1>Dashboard</h1>
<input type="text" class="search" placeholder="Search...">
</div>

<div class="cards">
<div class="card">
<h3>Total Courses</h3>
<p>5</p>
</div>
<div class="card">
<h3>Completed</h3>
<p>2</p>
</div>
<div class="card">
<h3>Pending</h3>
<p>3</p>
</div>
</div>

<div class="profile">
<h2>Welcome, <span id="name"></span></h2>
<p>This is your learning dashboard.</p>
<button class="btn">View Profile</button>
</div>

</div>

<script>
var user = localStorage.getItem("currentUser");
if(user){
 document.getElementById("name").innerText = user;
}else{
 document.getElementById("name").innerText = "Guest";
}

function logout(){
 localStorage.removeItem("currentUser");
 window.location.href = "login.html";
}
</script>

</body>
</html>
