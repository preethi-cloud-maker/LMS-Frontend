<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div class="sidebar">
<h2>LMS</h2>
<a href="index.html">Dashboard</a>
<a href="courses.html">Courses</a>
<a href="materials.html">Materials</a>
<a href="profile.html">Profile</a>
<a href="login.html">Logout</a>
</div>

<div class="main">

<h1>Welcome 👋 <span id="name"></span></h1>

<p id="quote"></p>

<h2>Registered Courses</h2>
<div id="courses"></div>

</div>

</div>

<script>
let user=localStorage.getItem("currentUser");
document.getElementById("name").innerText=user;

// quotes
let quotes=[
"Success is the sum of small efforts 💪",
"Study smart, not hard 📚",
"Discipline creates success 🚀",
"Never stop learning ✨"
];

document.getElementById("quote").innerText=
quotes[Math.floor(Math.random()*quotes.length)];

// courses per user
let data=JSON.parse(localStorage.getItem("userCourses"))||{};
let list=data[user]||[];

let div=document.getElementById("courses");

if(list.length===0){
div.innerHTML="<p>No courses selected</p>";
}else{
list.forEach(c=>{
div.innerHTML+=`<div class="card">📘 ${c}</div>`;
});
}
</script>

</body>
</html>
