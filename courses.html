<div class="main">

<h1>Select Courses</h1>

<div><input type="checkbox" value="Java"> Java</div>
<div><input type="checkbox" value="DBMS"> DBMS</div>
<div><input type="checkbox" value="CN"> Computer Networks</div>
<div><input type="checkbox" value="AI"> AI</div>

<button onclick="save()">Register</button>

</div>

</div>

<script>
function save(){
let arr=[];
document.querySelectorAll("input[type=checkbox]:checked")
.forEach(c=>arr.push(c.value));

let user=localStorage.getItem("currentUser");

let all=JSON.parse(localStorage.getItem("userCourses"))||{};
all[user]=arr;

localStorage.setItem("userCourses",JSON.stringify(all));

alert("Courses Registered 🎉");
}
</script>

</body>
